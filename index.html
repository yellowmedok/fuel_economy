<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>fuel_economy: Калькулятор поїздки</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="content">
        <div class="container">
            <h1>fuel_economy: Калькулятор поїздки</h1>
            
            <div id="eco-feature" style="display: none; background: #d4edda; color: #155724; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #c3e6cb;">
                🌱 <strong>Еко-режим:</strong> Ви заощадили б 15%, якби їхали зі швидкістю 90 км/год!
            </div>

            <div class="form-group">
                <label>Відстань (км):</label>
                <input type="number" id="distance" value="100">
            </div>
            <div class="form-group">
                <label>Витрата (л чи кВт/100км):</label>
                <input type="number" id="consumption" value="8">
            </div>
            <div class="form-group">
                <label>Ціна пального (грн/од):</label>
                <input type="number" id="price" value="55">
            </div>
            <button onclick="calculate()">Розрахувати вартість</button>
            <h2 id="result">Вартість: 0 грн</h2>
            <p class="hint">Порада: Використовуйте круїз-контроль для економії.</p> 
        </div>
    </main>

    <footer>
        <hr>
        <p>Статус системи: <span id="app-status"></span></p>
    </footer>

    <script type="module" src="/script.js"></script> 
</body>
</html>
