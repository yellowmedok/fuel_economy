<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Car Cost Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>UniCost: Калькулятор поїздки</h1>
        <div class="form-group">
            <label>Відстань (км):</label>
            <input type="number" id="distance" value="100">
        </div>
        <div class="form-group">
            <label>Витрата (л чи кВт/100км):</label>
            <input type="number" id="consumption" value="8">
        </div>
        <div class="form-group">
            <label>Ціна пального (грн/од):</label>
            <input type="number" id="price" value="55">
        </div>
        <button onclick="calculate()">Розрахувати вартість</button>
        <h2 id="result">Вартість: 0 грн</h2>

        <p class="hint">Порада: Використовуйте круїз-контроль на трасі для економії пального.</p> 

    </div>
    <script src="script.js"></script>
</body>
</html>
